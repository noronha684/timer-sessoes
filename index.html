<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer de Sessões</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timer">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0e0e1a;
    color: #eee;
    min-height: 100vh;
    padding: 20px;
    -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 20px; font-size: 20px; font-weight: 500; color: #aaa; letter-spacing: 0.5px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #1f1f2e; padding: 4px; border-radius: 12px; }
  .tab {
    flex: 1; padding: 10px; background: transparent;
    border: none; border-radius: 8px;
    text-align: center; cursor: pointer; font-size: 14px;
    color: #888; user-select: none;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: #2d2640; color: #fff; }

  .panel { display: none; }
  .panel.active { display: block; }

  .focus-card {
    background: #1f1f2e;
    border-radius: 16px;
    padding: 36px 28px;
    margin-bottom: 14px;
    text-align: center;
  }
  .focus-title {
    font-size: 22px; font-weight: 600;
    margin-bottom: 10px;
  }
  .focus-desc {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 28px;
    line-height: 1.55;
  }

  .picker {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; margin-bottom: 24px;
  }
  .picker-arrow {
    background: transparent; border: none;
    color: #888; font-size: 16px; cursor: pointer;
    width: 64px; height: 32px; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .picker-arrow:hover { background: rgba(255,255,255,0.06); color: #ccc; }
  .picker-arrow:active { background: rgba(255,255,255,0.12); }
  .picker-value {
    font-size: 64px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1; margin: 4px 0;
  }
  .picker-label {
    font-size: 13px; color: #888;
    text-transform: lowercase; letter-spacing: 0.5px;
  }

  .category-chip {
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 28px;
    padding: 9px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .category-chip:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
  .chip-arrow { color: #888; font-size: 11px; }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: #c4b5fd;
    border: none; border-radius: 10px;
    color: #1a1a25;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  .btn-primary:hover { background: #d4c5fe; }
  .btn-primary:active { transform: scale(0.98); }

  .running-cat {
    font-size: 13px; color: #aaa;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .timer-display {
    text-align: center; font-size: 96px; font-weight: 700;
    margin: 12px 0 28px; font-variant-numeric: tabular-nums;
    color: #fff; letter-spacing: 2px;
  }
  .timer-display.paused { color: #f5a623; }
  .timer-display.alerting { animation: pulse 0.6s infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); color: #c4b5fd; }
  }

  .controls { display: flex; gap: 10px; margin-bottom: 12px; }
  .btn {
    flex: 1; padding: 16px; border: none; border-radius: 10px;
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn-pause { background: #f5a623; }
  .btn-resume { background: #27ae60; }
  .btn-stop { background: #e94560; }
  .btn-pip {
    background: rgba(255,255,255,0.06); color: #ccc;
    width: 100%; padding: 12px; font-size: 13px; font-weight: 500;
  }
  .btn-pip:hover { background: rgba(255,255,255,0.1); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .today-card {
    background: #1f1f2e;
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 14px;
  }
  .today-title {
    font-size: 12px; color: #888;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .today-total {
    font-size: 26px; font-weight: 700;
    margin-bottom: 10px;
  }
  .today-breakdown {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .today-cat {
    background: rgba(255,255,255,0.05);
    padding: 5px 11px;
    border-radius: 7px;
    font-size: 13px; color: #ccc;
  }
  .today-cat-name { color: #888; margin-right: 6px; }
  .today-empty { color: #666; font-size: 13px; }

  .options {
    background: #1f1f2e; padding: 4px 22px; border-radius: 16px;
    margin-bottom: 20px;
  }
  .option { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; }
  .option + .option { border-top: 1px solid rgba(255,255,255,0.05); }
  .option label { font-size: 15px; cursor: pointer; }
  .option input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #c4b5fd; }

  .history-day {
    background: #1f1f2e; padding: 18px 22px; border-radius: 12px;
    margin-bottom: 10px;
  }
  .history-date { font-weight: 600; margin-bottom: 10px; font-size: 15px; color: #c4b5fd; text-transform: capitalize; }
  .history-line { display: flex; justify-content: space-between; padding: 5px 0; font-size: 15px; }
  .history-total {
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 8px; padding-top: 8px;
    font-weight: 600;
  }
  .empty { text-align: center; padding: 60px 20px; color: #888; }

  .alert-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .alert-overlay.active { display: flex; }
  .alert-box {
    background: #c4b5fd; padding: 40px; border-radius: 16px;
    text-align: center; animation: pulse 1s infinite;
    max-width: 90%;
  }
  .alert-box h2 { font-size: 28px; margin-bottom: 20px; color: #1a1a25; }
  .alert-box .btn { background: #1a1a25; color: #c4b5fd; padding: 14px 40px; flex: none; }
</style>
</head>
<body>
<div class="container">
  <h1>⏱️ Timer de Sessões</h1>

  <div class="tabs">
    <div class="tab active" data-panel="timer">Timer</div>
    <div class="tab" data-panel="history">Histórico</div>
  </div>

  <div class="panel active" id="timer-panel">
    <div class="focus-card" id="focusIdle">
      <div class="focus-title">Prepare-se para se concentrar</div>
      <div class="focus-desc">Defina o tempo, mantenha o foco até o fim e a sessão entra na sua jornada do dia.</div>

      <div class="picker">
        <button class="picker-arrow" id="durationUp" aria-label="Aumentar">▲</button>
        <div class="picker-value" id="durationValue">50</div>
        <div class="picker-label">min</div>
        <button class="picker-arrow" id="durationDown" aria-label="Diminuir">▼</button>
      </div>

      <button class="category-chip" id="categoryChip" type="button">
        <span id="categoryLabel">CFA</span>
        <span class="chip-arrow">⇄</span>
      </button>

      <button class="btn-primary" id="startBtn">▶ Iniciar sessão</button>
    </div>

    <div class="focus-card" id="focusRunning" style="display:none">
      <div class="running-cat" id="runningCat">CFA</div>
      <div class="timer-display" id="display">50:00</div>
      <div class="controls">
        <button class="btn btn-pause" id="pauseBtn">Pausar</button>
        <button class="btn btn-stop" id="stopBtn">Parar</button>
      </div>
      <button class="btn btn-pip" id="pipBtn" style="display:none">📱 Modo flutuante</button>
    </div>

    <div class="today-card">
      <div class="today-title">Hoje</div>
      <div class="today-total" id="todayTotal">0min</div>
      <div class="today-breakdown" id="todayBreakdown"></div>
    </div>

    <div class="options">
      <div class="option">
        <label for="soundOn">🔊 Notificação sonora</label>
        <input type="checkbox" id="soundOn" checked>
      </div>
      <div class="option">
        <label for="visualOn">💡 Notificação visual</label>
        <input type="checkbox" id="visualOn" checked>
      </div>
    </div>
  </div>

  <div class="panel" id="history-panel">
    <div id="historyList"></div>
  </div>
</div>

<div class="alert-overlay" id="alertOverlay">
  <div class="alert-box">
    <h2>⏰ Sessão concluída!</h2>
    <button class="btn" id="dismissAlert">OK</button>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

const $ = (s) => document.querySelector(s);
const display = $('#display');
const startBtn = $('#startBtn');
const pauseBtn = $('#pauseBtn');
const stopBtn = $('#stopBtn');
const overlay = $('#alertOverlay');

const state = {
  category: 'CFA',
  durationMs: 50 * 60 * 1000,
  remainingMs: 50 * 60 * 1000,
  running: false,
  paused: false,
  startedAt: null,
  intervalId: null,
  totalElapsedMs: 0,
};

let audioCtx = null;
function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch {}
}

// Wake Lock — mantém a tela ligada durante a sessão
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); }
  catch {}
}
function releaseWakeLock() {
  if (wakeLock) { try { wakeLock.release(); } catch {} wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.running && !state.paused) {
    requestWakeLock();
  }
});

// Document Picture-in-Picture — janela flutuante sobre outros apps
let pipWindow = null;
const pipBtn = $('#pipBtn');
const supportsDocPiP = 'documentPictureInPicture' in window;
const supportsVideoPiP = !!document.pictureInPictureEnabled;
if (supportsDocPiP || supportsVideoPiP) pipBtn.style.display = 'block';

// --- Video PiP (canvas → video) — funciona no Chrome Android ---
let pipCanvas = null, pipCanvasCtx = null, pipVideo = null, pipDrawInterval = null;

function setupVideoPipNodes() {
  if (pipCanvas) return;
  pipCanvas = document.createElement('canvas');
  pipCanvas.width = 480; pipCanvas.height = 270;
  pipCanvasCtx = pipCanvas.getContext('2d');
  pipVideo = document.createElement('video');
  pipVideo.muted = true;
  pipVideo.playsInline = true;
  pipVideo.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;';
  document.body.appendChild(pipVideo);
}

function drawPipFrame() {
  if (!pipCanvasCtx) return;
  const W = pipCanvas.width, H = pipCanvas.height;
  pipCanvasCtx.fillStyle = '#1a1a25';
  pipCanvasCtx.fillRect(0, 0, W, H);
  pipCanvasCtx.textAlign = 'center';
  pipCanvasCtx.fillStyle = state.paused ? '#f5a623' : '#fff';
  pipCanvasCtx.font = 'bold 110px -apple-system, BlinkMacSystemFont, sans-serif';
  pipCanvasCtx.fillText(display.textContent, W/2, 165);
  pipCanvasCtx.fillStyle = '#888';
  pipCanvasCtx.font = '18px -apple-system, BlinkMacSystemFont, sans-serif';
  const status = state.paused ? 'PAUSADO' : (state.running ? 'EM ANDAMENTO' : 'PARADO');
  pipCanvasCtx.fillText(status, W/2, 220);
}

function updatePipMediaState() {
  if (!pipVideo) return;
  if (state.running && !state.paused) {
    if (pipVideo.paused) pipVideo.play().catch(() => {});
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  } else {
    if (!pipVideo.paused) pipVideo.pause();
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  }
}

async function openVideoPiP() {
  setupVideoPipNodes();
  drawPipFrame();
  if (!pipVideo.srcObject) {
    pipVideo.srcObject = pipCanvas.captureStream(2);
  }
  await pipVideo.play();
  if ('mediaSession' in navigator) {
    try {
      navigator.mediaSession.setActionHandler('pause', () => { if (state.running && !state.paused) pauseBtn.click(); });
      navigator.mediaSession.setActionHandler('play', () => { if (state.paused) startBtn.click(); });
      navigator.mediaSession.setActionHandler('stop', () => { if (state.running) stopBtn.click(); });
    } catch {}
  }
  await pipVideo.requestPictureInPicture();
  pipDrawInterval = setInterval(drawPipFrame, 1000);
  updatePipMediaState();
  pipVideo.addEventListener('leavepictureinpicture', () => {
    if (pipDrawInterval) { clearInterval(pipDrawInterval); pipDrawInterval = null; }
    pipBtn.textContent = '📱 Modo flutuante';
  }, { once: true });
  pipBtn.textContent = '✕ Fechar flutuante';
}

// --- Document PiP — janela com botões reais (Chrome/Edge desktop) ---
async function openDocPiP() {
  pipWindow = await documentPictureInPicture.requestWindow({ width: 280, height: 210 });
  pipWindow.document.head.innerHTML = `
    <meta charset="UTF-8">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e; color: #eee;
        height: 100vh; padding: 14px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 8px;
      }
      .pip-time { font-size: 64px; font-weight: bold; color: #fff; font-variant-numeric: tabular-nums; }
      .pip-time.paused { color: #f5a623; }
      .pip-controls { display: flex; gap: 6px; width: 100%; margin-top: 4px; }
      .pip-btn {
        flex: 1; padding: 10px; border: none; border-radius: 6px;
        color: #1a1a25; font-size: 14px; font-weight: bold; cursor: pointer;
      }
      .pip-pause { background: #f5a623; color: #1a1a25; }
      .pip-resume { background: #c4b5fd; color: #1a1a25; }
      .pip-stop { background: #e94560; color: #fff; }
    </style>`;
  pipWindow.document.body.innerHTML = `
    <div class="pip-time" id="pipTime">00:00</div>
    <div class="pip-controls">
      <button class="pip-btn pip-pause" id="pipPauseBtn">Pausar</button>
      <button class="pip-btn pip-stop" id="pipStopBtn">Parar</button>
    </div>`;
  pipWindow.document.getElementById('pipPauseBtn').addEventListener('click', () => {
    if (!state.running) return;
    if (state.paused) startBtn.click(); else pauseBtn.click();
  });
  pipWindow.document.getElementById('pipStopBtn').addEventListener('click', () => {
    if (state.running) stopBtn.click();
  });
  pipWindow.addEventListener('pagehide', () => {
    pipWindow = null;
    pipBtn.textContent = '📱 Modo flutuante';
  });
  pipBtn.textContent = '✕ Fechar flutuante';
  syncPip();
}

pipBtn.addEventListener('click', async () => {
  try {
    if (supportsDocPiP) {
      if (pipWindow) { pipWindow.close(); return; }
      await openDocPiP();
    } else if (supportsVideoPiP) {
      if (document.pictureInPictureElement) {
        await document.exitPictureInPicture();
      } else {
        await openVideoPiP();
      }
    }
  } catch (e) { console.warn('PiP error:', e); }
});

function syncPip() {
  if (pipWindow) {
    const t = pipWindow.document.getElementById('pipTime');
    const pb = pipWindow.document.getElementById('pipPauseBtn');
    if (t) { t.textContent = display.textContent; t.classList.toggle('paused', state.paused); }
    if (pb) {
      if (state.paused) { pb.textContent = 'Retomar'; pb.className = 'pip-btn pip-resume'; }
      else { pb.textContent = 'Pausar'; pb.className = 'pip-btn pip-pause'; }
    }
  }
  drawPipFrame();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    $('#' + tab.dataset.panel + '-panel').classList.add('active');
    if (tab.dataset.panel === 'history') renderHistory();
  });
});

// Categoria — chip que alterna CFA / Trabalho
const categoryChip = $('#categoryChip');
const categoryLabel = $('#categoryLabel');
categoryChip.addEventListener('click', () => {
  if (state.running) return;
  state.category = state.category === 'CFA' ? 'Trabalho' : 'CFA';
  categoryLabel.textContent = state.category;
});

// Duração — picker com setinhas (incrementos de 5 min, mín 5, máx 240)
const durationValue = $('#durationValue');
function setDurationMinutes(mins) {
  mins = Math.max(5, Math.min(240, mins));
  durationValue.textContent = mins;
  setDuration(mins * 60 * 1000);
}
$('#durationUp').addEventListener('click', () => {
  if (state.running) return;
  setDurationMinutes(parseInt(durationValue.textContent) + 5);
});
$('#durationDown').addEventListener('click', () => {
  if (state.running) return;
  setDurationMinutes(parseInt(durationValue.textContent) - 5);
});

function setDuration(ms) {
  state.durationMs = ms;
  state.remainingMs = ms;
  updateDisplay();
}

function updateDisplay() {
  const totalSec = Math.max(0, Math.ceil(state.remainingMs / 1000));
  const mm = Math.floor(totalSec / 60).toString().padStart(2, '0');
  const ss = (totalSec % 60).toString().padStart(2, '0');
  display.textContent = `${mm}:${ss}`;
  document.title = state.running ? `${mm}:${ss} • Timer` : 'Timer de Sessões';
  syncPip();
}

function tick() {
  const delta = Date.now() - state.startedAt;
  state.remainingMs = state.durationMs - state.totalElapsedMs - delta;
  if (state.remainingMs <= 0) {
    state.remainingMs = 0;
    updateDisplay();
    finishSession(true);
    return;
  }
  updateDisplay();
}

startBtn.addEventListener('click', () => {
  ensureAudio();
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  state.running = true;
  state.paused = false;
  state.startedAt = Date.now();
  state.totalElapsedMs = 0;
  state.remainingMs = state.durationMs;
  state.intervalId = setInterval(tick, 250);
  // Troca pra view de sessão em andamento
  $('#focusIdle').style.display = 'none';
  $('#focusRunning').style.display = 'block';
  $('#runningCat').textContent = state.category;
  pauseBtn.textContent = 'Pausar';
  pauseBtn.classList.remove('btn-resume');
  pauseBtn.classList.add('btn-pause');
  display.classList.remove('paused');
  requestWakeLock();
  syncPip();
  updatePipMediaState();
});

// pauseBtn agora alterna entre Pausar e Retomar
pauseBtn.addEventListener('click', () => {
  if (!state.running) return;
  if (state.paused) {
    // Retomar
    state.paused = false;
    state.startedAt = Date.now();
    state.intervalId = setInterval(tick, 250);
    display.classList.remove('paused');
    pauseBtn.textContent = 'Pausar';
    pauseBtn.classList.remove('btn-resume');
    pauseBtn.classList.add('btn-pause');
    requestWakeLock();
  } else {
    // Pausar
    state.paused = true;
    clearInterval(state.intervalId);
    state.totalElapsedMs += Date.now() - state.startedAt;
    display.classList.add('paused');
    pauseBtn.textContent = 'Retomar';
    pauseBtn.classList.remove('btn-pause');
    pauseBtn.classList.add('btn-resume');
    releaseWakeLock();
  }
  syncPip();
  updatePipMediaState();
});

stopBtn.addEventListener('click', () => {
  if (!state.running) return;
  finishSession(false);
});

function finishSession(completed) {
  let elapsedMs = state.totalElapsedMs;
  if (!state.paused && state.running) {
    elapsedMs += Date.now() - state.startedAt;
  }
  if (completed) elapsedMs = state.durationMs;
  clearInterval(state.intervalId);
  state.running = false;
  state.paused = false;
  state.intervalId = null;

  if (elapsedMs >= 1000) saveSession(state.category, elapsedMs);

  if (completed) triggerAlert();

  state.remainingMs = state.durationMs;
  state.totalElapsedMs = 0;
  display.classList.remove('paused');
  // Volta pra view inicial
  $('#focusRunning').style.display = 'none';
  $('#focusIdle').style.display = 'block';
  releaseWakeLock();
  updateDisplay();
  updatePipMediaState();
  renderToday();
}

function triggerAlert() {
  if ($('#soundOn').checked) playSound();
  if ($('#visualOn').checked) {
    overlay.classList.add('active');
    display.classList.add('alerting');
    if ('Notification' in window && Notification.permission === 'granted') {
      try {
        new Notification('Sessão concluída!', {
          body: `${state.category} - tempo finalizado`,
          icon: 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>'
        });
      } catch {}
    }
  }
}

$('#dismissAlert').addEventListener('click', () => {
  overlay.classList.remove('active');
  display.classList.remove('alerting');
});

function playSound() {
  ensureAudio();
  if (!audioCtx) return;
  const beep = (freq, start, dur) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    const t = audioCtx.currentTime + start;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.05);
    gain.gain.linearRampToValueAtTime(0, t + dur);
    osc.start(t);
    osc.stop(t + dur);
  };
  beep(880, 0, 0.3);
  beep(660, 0.4, 0.3);
  beep(880, 0.8, 0.6);
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('timerHistory') || '{}'); }
  catch { return {}; }
}
function saveSession(category, elapsedMs) {
  const history = loadHistory();
  const today = new Date().toISOString().slice(0, 10);
  if (!history[today]) history[today] = {};
  history[today][category] = (history[today][category] || 0) + elapsedMs;
  localStorage.setItem('timerHistory', JSON.stringify(history));
}

function formatDuration(ms) {
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return `${m}min`;
  return `${h}h${m.toString().padStart(2, '0')}`;
}

function renderToday() {
  const history = loadHistory();
  const today = new Date().toISOString().slice(0, 10);
  const day = history[today] || {};
  const total = Object.values(day).reduce((a, b) => a + b, 0);
  $('#todayTotal').textContent = total > 0 ? formatDuration(total) : '0min';
  const breakdown = $('#todayBreakdown');
  const entries = Object.entries(day);
  if (entries.length === 0) {
    breakdown.innerHTML = '<div class="today-empty">Nenhuma sessão hoje ainda.</div>';
  } else {
    breakdown.innerHTML = entries.map(([cat, ms]) =>
      `<div class="today-cat"><span class="today-cat-name">${cat}</span>${formatDuration(ms)}</div>`
    ).join('');
  }
}

function renderHistory() {
  const list = $('#historyList');
  const history = loadHistory();
  const dates = Object.keys(history).sort().reverse();
  if (dates.length === 0) {
    list.innerHTML = '<div class="empty">Nenhuma sessão registrada ainda.<br>Comece um timer para popular o histórico.</div>';
    return;
  }
  list.innerHTML = dates.map(date => {
    const day = history[date];
    const total = Object.values(day).reduce((a, b) => a + b, 0);
    const formatted = new Date(date + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
    return `
      <div class="history-day">
        <div class="history-date">${formatted}</div>
        ${Object.entries(day).map(([cat, ms]) => `
          <div class="history-line">
            <span>${cat}</span><span>${formatDuration(ms)}</span>
          </div>
        `).join('')}
        <div class="history-line history-total">
          <span>Total</span><span>${formatDuration(total)}</span>
        </div>
      </div>
    `;
  }).join('');
}

updateDisplay();
renderToday();
</script>

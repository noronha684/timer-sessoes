<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer de Sessões</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timer">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    padding: 20px;
    -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 24px; font-size: 28px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab {
    flex: 1; padding: 14px; background: #16213e;
    border: 2px solid transparent; border-radius: 10px;
    text-align: center; cursor: pointer; font-size: 16px;
    color: #eee; user-select: none;
  }
  .tab.active { background: #0f3460; border-color: #e94560; }

  .panel { display: none; }
  .panel.active { display: block; }

  .label { font-size: 14px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

  .category-select { display: flex; gap: 8px; margin-bottom: 24px; }
  .category-btn {
    flex: 1; padding: 18px; background: #16213e;
    border: 2px solid transparent; border-radius: 10px;
    color: #eee; font-size: 18px; font-weight: bold; cursor: pointer;
  }
  .category-btn.active { background: #0f3460; border-color: #e94560; }

  .duration-presets { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .duration-btn {
    flex: 1; min-width: 80px; padding: 14px;
    background: #16213e; border: 2px solid transparent; border-radius: 10px;
    color: #eee; cursor: pointer; font-size: 16px;
  }
  .duration-btn.active { background: #0f3460; border-color: #e94560; }

  .custom-duration {
    width: 100%; padding: 14px; background: #16213e;
    border: 2px solid #16213e; border-radius: 10px;
    color: #eee; font-size: 16px; margin-bottom: 24px;
    -webkit-appearance: none; appearance: none;
  }
  .custom-duration:focus { outline: none; border-color: #e94560; }

  .timer-display {
    text-align: center; font-size: 96px; font-weight: bold;
    margin: 32px 0; font-variant-numeric: tabular-nums;
    color: #e94560; letter-spacing: 2px;
  }
  .timer-display.paused { color: #f5a623; }
  .timer-display.alerting { animation: pulse 0.6s infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); color: #fff; }
  }

  .controls { display: flex; gap: 12px; margin-bottom: 24px; }
  .btn {
    flex: 1; padding: 20px; border: none; border-radius: 10px;
    color: #fff; font-size: 18px; font-weight: bold; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn-start { background: #27ae60; }
  .btn-pause { background: #f5a623; }
  .btn-stop { background: #e94560; }
  .btn-pip { background: #0f3460; width: 100%; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .options {
    background: #16213e; padding: 16px 20px; border-radius: 10px;
    margin-bottom: 20px;
  }
  .option { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
  .option label { font-size: 16px; cursor: pointer; }
  .option input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }

  .history-day {
    background: #16213e; padding: 16px 20px; border-radius: 10px;
    margin-bottom: 12px;
  }
  .history-date { font-weight: bold; margin-bottom: 10px; font-size: 16px; color: #e94560; text-transform: capitalize; }
  .history-line { display: flex; justify-content: space-between; padding: 6px 0; font-size: 16px; }
  .history-total {
    border-top: 1px solid #0f3460;
    margin-top: 10px; padding-top: 10px;
    font-weight: bold;
  }
  .empty { text-align: center; padding: 60px 20px; color: #888; }

  .alert-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .alert-overlay.active { display: flex; }
  .alert-box {
    background: #e94560; padding: 40px; border-radius: 16px;
    text-align: center; animation: pulse 1s infinite;
    max-width: 90%;
  }
  .alert-box h2 { font-size: 32px; margin-bottom: 20px; color: #fff; }
  .alert-box .btn { background: #fff; color: #e94560; padding: 16px 50px; }
</style>
</head>
<body>
<div class="container">
  <h1>⏱️ Timer de Sessões</h1>

  <div class="tabs">
    <div class="tab active" data-panel="timer">Timer</div>
    <div class="tab" data-panel="history">Histórico</div>
  </div>

  <div class="panel active" id="timer-panel">
    <div class="label">Categoria</div>
    <div class="category-select">
      <button class="category-btn active" data-category="CFA">CFA</button>
      <button class="category-btn" data-category="Trabalho">Trabalho</button>
    </div>

    <div class="label">Duração</div>
    <div class="duration-presets">
      <button class="duration-btn" data-minutes="25">25 min</button>
      <button class="duration-btn active" data-minutes="50">50 min</button>
      <button class="duration-btn" data-minutes="60">1 h</button>
      <button class="duration-btn" data-minutes="90">1h30</button>
    </div>
    <input type="number" class="custom-duration" placeholder="Ou personalizado (minutos)" min="1" id="customMinutes" inputmode="numeric">

    <div class="timer-display" id="display">50:00</div>

    <div class="controls">
      <button class="btn btn-start" id="startBtn">Iniciar</button>
      <button class="btn btn-pause" id="pauseBtn" disabled>Pausar</button>
      <button class="btn btn-stop" id="stopBtn" disabled>Parar</button>
    </div>

    <button class="btn btn-pip" id="pipBtn" style="display:none; margin-bottom: 20px;">📱 Modo flutuante</button>

    <div class="options">
      <div class="option">
        <label for="soundOn">🔊 Notificação sonora</label>
        <input type="checkbox" id="soundOn" checked>
      </div>
      <div class="option">
        <label for="visualOn">💡 Notificação visual</label>
        <input type="checkbox" id="visualOn" checked>
      </div>
    </div>
  </div>

  <div class="panel" id="history-panel">
    <div id="historyList"></div>
  </div>
</div>

<div class="alert-overlay" id="alertOverlay">
  <div class="alert-box">
    <h2>⏰ Sessão concluída!</h2>
    <button class="btn" id="dismissAlert">OK</button>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

const $ = (s) => document.querySelector(s);
const display = $('#display');
const startBtn = $('#startBtn');
const pauseBtn = $('#pauseBtn');
const stopBtn = $('#stopBtn');
const overlay = $('#alertOverlay');

const state = {
  category: 'CFA',
  durationMs: 50 * 60 * 1000,
  remainingMs: 50 * 60 * 1000,
  running: false,
  paused: false,
  startedAt: null,
  intervalId: null,
  totalElapsedMs: 0,
};

let audioCtx = null;
function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch {}
}

// Wake Lock — mantém a tela ligada durante a sessão
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); }
  catch {}
}
function releaseWakeLock() {
  if (wakeLock) { try { wakeLock.release(); } catch {} wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.running && !state.paused) {
    requestWakeLock();
  }
});

// Document Picture-in-Picture — janela flutuante sobre outros apps
let pipWindow = null;
const pipBtn = $('#pipBtn');
const supportsDocPiP = 'documentPictureInPicture' in window;
const supportsVideoPiP = !!document.pictureInPictureEnabled;
if (supportsDocPiP || supportsVideoPiP) pipBtn.style.display = 'block';

// --- Video PiP (canvas → video) — funciona no Chrome Android ---
let pipCanvas = null, pipCanvasCtx = null, pipVideo = null, pipDrawInterval = null;

function setupVideoPipNodes() {
  if (pipCanvas) return;
  pipCanvas = document.createElement('canvas');
  pipCanvas.width = 480; pipCanvas.height = 270;
  pipCanvasCtx = pipCanvas.getContext('2d');
  pipVideo = document.createElement('video');
  pipVideo.muted = true;
  pipVideo.playsInline = true;
  pipVideo.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;';
  document.body.appendChild(pipVideo);
}

function drawPipFrame() {
  if (!pipCanvasCtx) return;
  const W = pipCanvas.width, H = pipCanvas.height;
  pipCanvasCtx.fillStyle = '#1a1a2e';
  pipCanvasCtx.fillRect(0, 0, W, H);
  pipCanvasCtx.textAlign = 'center';
  pipCanvasCtx.fillStyle = '#aaa';
  pipCanvasCtx.font = 'bold 22px -apple-system, BlinkMacSystemFont, sans-serif';
  pipCanvasCtx.fillText(state.category.toUpperCase(), W/2, 55);
  pipCanvasCtx.fillStyle = state.paused ? '#f5a623' : '#e94560';
  pipCanvasCtx.font = 'bold 96px -apple-system, BlinkMacSystemFont, sans-serif';
  pipCanvasCtx.fillText(display.textContent, W/2, 175);
  pipCanvasCtx.fillStyle = '#888';
  pipCanvasCtx.font = '18px -apple-system, BlinkMacSystemFont, sans-serif';
  const status = state.paused ? 'PAUSADO' : (state.running ? 'EM ANDAMENTO' : 'PARADO');
  pipCanvasCtx.fillText(status, W/2, 235);
}

function updatePipMediaState() {
  if (!pipVideo) return;
  if (state.running && !state.paused) {
    if (pipVideo.paused) pipVideo.play().catch(() => {});
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  } else {
    if (!pipVideo.paused) pipVideo.pause();
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  }
}

async function openVideoPiP() {
  setupVideoPipNodes();
  drawPipFrame();
  if (!pipVideo.srcObject) {
    pipVideo.srcObject = pipCanvas.captureStream(2);
  }
  await pipVideo.play();
  if ('mediaSession' in navigator) {
    try {
      navigator.mediaSession.setActionHandler('pause', () => { if (state.running && !state.paused) pauseBtn.click(); });
      navigator.mediaSession.setActionHandler('play', () => { if (state.paused) startBtn.click(); });
      navigator.mediaSession.setActionHandler('stop', () => { if (state.running) stopBtn.click(); });
    } catch {}
  }
  await pipVideo.requestPictureInPicture();
  pipDrawInterval = setInterval(drawPipFrame, 1000);
  updatePipMediaState();
  pipVideo.addEventListener('leavepictureinpicture', () => {
    if (pipDrawInterval) { clearInterval(pipDrawInterval); pipDrawInterval = null; }
    pipBtn.textContent = '📱 Modo flutuante';
  }, { once: true });
  pipBtn.textContent = '✕ Fechar flutuante';
}

// --- Document PiP — janela com botões reais (Chrome/Edge desktop) ---
async function openDocPiP() {
  pipWindow = await documentPictureInPicture.requestWindow({ width: 280, height: 210 });
  pipWindow.document.head.innerHTML = `
    <meta charset="UTF-8">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e; color: #eee;
        height: 100vh; padding: 14px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 8px;
      }
      .pip-cat { font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
      .pip-time { font-size: 56px; font-weight: bold; color: #e94560; font-variant-numeric: tabular-nums; }
      .pip-time.paused { color: #f5a623; }
      .pip-controls { display: flex; gap: 6px; width: 100%; margin-top: 4px; }
      .pip-btn {
        flex: 1; padding: 10px; border: none; border-radius: 6px;
        color: #fff; font-size: 14px; font-weight: bold; cursor: pointer;
      }
      .pip-pause { background: #f5a623; }
      .pip-resume { background: #27ae60; }
      .pip-stop { background: #e94560; }
    </style>`;
  pipWindow.document.body.innerHTML = `
    <div class="pip-cat" id="pipCat">${state.category}</div>
    <div class="pip-time" id="pipTime">00:00</div>
    <div class="pip-controls">
      <button class="pip-btn pip-pause" id="pipPauseBtn">Pausar</button>
      <button class="pip-btn pip-stop" id="pipStopBtn">Parar</button>
    </div>`;
  pipWindow.document.getElementById('pipPauseBtn').addEventListener('click', () => {
    if (!state.running) return;
    if (state.paused) startBtn.click(); else pauseBtn.click();
  });
  pipWindow.document.getElementById('pipStopBtn').addEventListener('click', () => {
    if (state.running) stopBtn.click();
  });
  pipWindow.addEventListener('pagehide', () => {
    pipWindow = null;
    pipBtn.textContent = '📱 Modo flutuante';
  });
  pipBtn.textContent = '✕ Fechar flutuante';
  syncPip();
}

pipBtn.addEventListener('click', async () => {
  try {
    if (supportsDocPiP) {
      if (pipWindow) { pipWindow.close(); return; }
      await openDocPiP();
    } else if (supportsVideoPiP) {
      if (document.pictureInPictureElement) {
        await document.exitPictureInPicture();
      } else {
        await openVideoPiP();
      }
    }
  } catch (e) { console.warn('PiP error:', e); }
});

function syncPip() {
  if (pipWindow) {
    const t = pipWindow.document.getElementById('pipTime');
    const c = pipWindow.document.getElementById('pipCat');
    const pb = pipWindow.document.getElementById('pipPauseBtn');
    if (t) { t.textContent = display.textContent; t.classList.toggle('paused', state.paused); }
    if (c) c.textContent = state.category;
    if (pb) {
      if (state.paused) { pb.textContent = 'Retomar'; pb.className = 'pip-btn pip-resume'; }
      else { pb.textContent = 'Pausar'; pb.className = 'pip-btn pip-pause'; }
    }
  }
  drawPipFrame();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    $('#' + tab.dataset.panel + '-panel').classList.add('active');
    if (tab.dataset.panel === 'history') renderHistory();
  });
});

document.querySelectorAll('.category-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.running) return;
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.category = btn.dataset.category;
  });
});

document.querySelectorAll('.duration-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.running) return;
    document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setDuration(parseInt(btn.dataset.minutes) * 60 * 1000);
    $('#customMinutes').value = '';
  });
});

$('#customMinutes').addEventListener('input', (e) => {
  if (state.running) return;
  const mins = parseInt(e.target.value);
  if (mins > 0) {
    document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
    setDuration(mins * 60 * 1000);
  }
});

function setDuration(ms) {
  state.durationMs = ms;
  state.remainingMs = ms;
  updateDisplay();
}

function updateDisplay() {
  const totalSec = Math.max(0, Math.ceil(state.remainingMs / 1000));
  const mm = Math.floor(totalSec / 60).toString().padStart(2, '0');
  const ss = (totalSec % 60).toString().padStart(2, '0');
  display.textContent = `${mm}:${ss}`;
  document.title = state.running ? `${mm}:${ss} • Timer` : 'Timer de Sessões';
  syncPip();
}

function tick() {
  const delta = Date.now() - state.startedAt;
  state.remainingMs = state.durationMs - state.totalElapsedMs - delta;
  if (state.remainingMs <= 0) {
    state.remainingMs = 0;
    updateDisplay();
    finishSession(true);
    return;
  }
  updateDisplay();
}

startBtn.addEventListener('click', () => {
  ensureAudio();
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  if (state.paused) {
    state.paused = false;
    state.startedAt = Date.now();
    state.intervalId = setInterval(tick, 250);
    display.classList.remove('paused');
    startBtn.textContent = 'Iniciar';
    startBtn.disabled = true;
    pauseBtn.disabled = false;
  } else {
    state.running = true;
    state.paused = false;
    state.startedAt = Date.now();
    state.totalElapsedMs = 0;
    state.remainingMs = state.durationMs;
    state.intervalId = setInterval(tick, 250);
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    stopBtn.disabled = false;
  }
  requestWakeLock();
  syncPip();
  updatePipMediaState();
});

pauseBtn.addEventListener('click', () => {
  if (!state.running || state.paused) return;
  state.paused = true;
  clearInterval(state.intervalId);
  state.totalElapsedMs += Date.now() - state.startedAt;
  display.classList.add('paused');
  startBtn.textContent = 'Retomar';
  startBtn.disabled = false;
  pauseBtn.disabled = true;
  releaseWakeLock();
  syncPip();
  updatePipMediaState();
});

stopBtn.addEventListener('click', () => {
  if (!state.running) return;
  if (!confirm('Parar a sessão antes do fim? O tempo decorrido será salvo.')) return;
  finishSession(false);
});

function finishSession(completed) {
  let elapsedMs = state.totalElapsedMs;
  if (!state.paused && state.running) {
    elapsedMs += Date.now() - state.startedAt;
  }
  if (completed) elapsedMs = state.durationMs;
  clearInterval(state.intervalId);
  state.running = false;
  state.paused = false;
  state.intervalId = null;

  if (elapsedMs >= 1000) saveSession(state.category, elapsedMs);

  if (completed) triggerAlert();

  state.remainingMs = state.durationMs;
  state.totalElapsedMs = 0;
  display.classList.remove('paused');
  startBtn.textContent = 'Iniciar';
  startBtn.disabled = false;
  pauseBtn.disabled = true;
  stopBtn.disabled = true;
  releaseWakeLock();
  updateDisplay();
  updatePipMediaState();
}

function triggerAlert() {
  if ($('#soundOn').checked) playSound();
  if ($('#visualOn').checked) {
    overlay.classList.add('active');
    display.classList.add('alerting');
    if ('Notification' in window && Notification.permission === 'granted') {
      try {
        new Notification('Sessão concluída!', {
          body: `${state.category} - tempo finalizado`,
          icon: 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>'
        });
      } catch {}
    }
  }
}

$('#dismissAlert').addEventListener('click', () => {
  overlay.classList.remove('active');
  display.classList.remove('alerting');
});

function playSound() {
  ensureAudio();
  if (!audioCtx) return;
  const beep = (freq, start, dur) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    const t = audioCtx.currentTime + start;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.05);
    gain.gain.linearRampToValueAtTime(0, t + dur);
    osc.start(t);
    osc.stop(t + dur);
  };
  beep(880, 0, 0.3);
  beep(660, 0.4, 0.3);
  beep(880, 0.8, 0.6);
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('timerHistory') || '{}'); }
  catch { return {}; }
}
function saveSession(category, elapsedMs) {
  const history = loadHistory();
  const today = new Date().toISOString().slice(0, 10);
  if (!history[today]) history[today] = {};
  history[today][category] = (history[today][category] || 0) + elapsedMs;
  localStorage.setItem('timerHistory', JSON.stringify(history));
}

function formatDuration(ms) {
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return `${m}min`;
  return `${h}h${m.toString().padStart(2, '0')}`;
}

function renderHistory() {
  const list = $('#historyList');
  const history = loadHistory();
  const dates = Object.keys(history).sort().reverse();
  if (dates.length === 0) {
    list.innerHTML = '<div class="empty">Nenhuma sessão registrada ainda.<br>Comece um timer para popular o histórico.</div>';
    return;
  }
  list.innerHTML = dates.map(date => {
    const day = history[date];
    const total = Object.values(day).reduce((a, b) => a + b, 0);
    const formatted = new Date(date + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
    return `
      <div class="history-day">
        <div class="history-date">${formatted}</div>
        ${Object.entries(day).map(([cat, ms]) => `
          <div class="history-line">
            <span>${cat}</span><span>${formatDuration(ms)}</span>
          </div>
        `).join('')}
        <div class="history-line history-total">
          <span>Total</span><span>${formatDuration(total)}</span>
        </div>
      </div>
    `;
  }).join('');
}

updateDisplay();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Entrar — Timer de Sessões</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0d0d0e; color: #f2ede4;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .card { max-width: 420px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
  p { color: #8a8a90; font-size: 14px; line-height: 1.5; }
  .ok { color: #9ad0a5; font-size: 40px; margin-bottom: 12px; }
  .err { color: #e0a19b; }
  .spin {
    width: 28px; height: 28px; margin: 0 auto 16px;
    border: 3px solid rgba(255,255,255,0.1); border-top-color: #f2f2f0;
    border-radius: 50%; animation: g 0.9s linear infinite;
  }
  @keyframes g { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spin" id="spin"></div>
  <h1 id="title">Conectando com o Google…</h1>
  <p id="msg">Você será redirecionado pro login do Google.</p>
</div>
<script>
window.firebaseConfig = {
  apiKey: "AIzaSyBylkeEsWQYwOWMpDxFidBHejuE1PJCMNQ",
  authDomain: "timer-sessoes.firebaseapp.com",
  projectId: "timer-sessoes",
  storageBucket: "timer-sessoes.firebasestorage.app",
  messagingSenderId: "479492010362",
  appId: "1:479492010362:web:4fdfbedd7789dcc4aee6c3"
};
</script>
<script type="module">
// Ponte de login da CASCA DESKTOP: roda no navegador REAL do usuário (o Google
// bloqueia browsers embutidos), faz o login por redirect e devolve o ID token
// do Google pro app via loopback local (porta passada na URL pela casca).
import { initializeApp } from "./vendor/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, setPersistence, inMemoryPersistence } from "./vendor/firebase-auth.js";

const el = (id) => document.getElementById(id);
const done = (ok, title, msg) => {
  el('spin').style.display = 'none';
  el('title').textContent = title;
  el('msg').textContent = msg;
  if (ok) { const s = document.createElement('div'); s.className = 'ok'; s.textContent = '✓'; el('card').prepend(s); }
  else el('title').classList.add('err');
};

try {
  // porta/state vêm da casca na 1ª carga; sobrevivem ao redirect via sessionStorage
  const q = new URLSearchParams(location.search);
  if (q.get('port')) sessionStorage.setItem('bridgePort', q.get('port'));
  if (q.get('state')) sessionStorage.setItem('bridgeState', q.get('state'));
  const port = sessionStorage.getItem('bridgePort');
  const state = sessionStorage.getItem('bridgeState');
  if (!port || !/^\d{2,5}$/.test(port)) throw new Error('Abra esta página pelo app do Windows (porta ausente).');

  const app = initializeApp(window.firebaseConfig);
  const auth = getAuth(app);
  // o login "de verdade" fica no APP; aqui a sessão é descartável
  await setPersistence(auth, inMemoryPersistence).catch(() => {});

  const result = await getRedirectResult(auth).catch((e) => { throw e; });
  if (!result) {
    // 1ª carga: manda pro Google (redirect não depende de popup/gesto)
    const provider = new GoogleAuthProvider();
    await signInWithRedirect(auth, provider);
  } else {
    const cred = GoogleAuthProvider.credentialFromResult(result);
    if (!cred || !cred.idToken) throw new Error('Google não devolveu a credencial.');
    // text/plain = requisição simples (sem preflight); loopback é isento de mixed content
    const r = await fetch('http://127.0.0.1:' + port + '/token', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ state, idToken: cred.idToken }),
    });
    if (!r.ok) throw new Error('O app não recebeu o login (código ' + r.status + '). Ele ainda está aberto?');
    sessionStorage.removeItem('bridgePort');
    sessionStorage.removeItem('bridgeState');
    done(true, 'Login concluído!', 'Pode fechar esta aba e voltar pro Timer de Sessões.');
  }
} catch (e) {
  done(false, 'Não deu certo', (e && e.message) || String(e));
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Entrar — Timer de Sessões</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0d0d0e; color: #f2ede4;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .card { max-width: 420px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
  p { color: #8a8a90; font-size: 14px; line-height: 1.5; }
  .ok { color: #9ad0a5; font-size: 40px; margin-bottom: 12px; }
  .err { color: #e0a19b; }
  .spin {
    width: 28px; height: 28px; margin: 0 auto 16px;
    border: 3px solid rgba(255,255,255,0.1); border-top-color: #f2f2f0;
    border-radius: 50%; animation: g 0.9s linear infinite;
  }
  @keyframes g { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spin" id="spin" style="display:none"></div>
  <h1 id="title">Entrar no Timer de Sessões</h1>
  <p id="msg">Confirme pra abrir o login do Google.</p>
  <button id="go" style="margin-top:18px;padding:12px 22px;border:none;border-radius:10px;background:#f2f2f0;color:#1e1a12;font-size:15px;font-weight:600;cursor:pointer">Continuar com Google</button>
</div>
<script>
window.firebaseConfig = {
  apiKey: "AIzaSyBylkeEsWQYwOWMpDxFidBHejuE1PJCMNQ",
  authDomain: "timer-sessoes.firebaseapp.com",
  projectId: "timer-sessoes",
  storageBucket: "timer-sessoes.firebasestorage.app",
  messagingSenderId: "479492010362",
  appId: "1:479492010362:web:4fdfbedd7789dcc4aee6c3"
};
</script>
<script type="module">
// Ponte de login da CASCA DESKTOP: roda no navegador REAL do usuário (o Google
// bloqueia browsers embutidos), faz o login por redirect e devolve o ID token
// do Google pro app via loopback local (porta passada na URL pela casca).
// POPUP com clique do usuário (não redirect): o fluxo por redirect quebra com o
// particionamento de storage do Chrome quando o authDomain (firebaseapp.com) é
// diferente do domínio da página — dava auth/internal-error. O popup é o mesmo
// caminho que o site principal usa no navegador, comprovadamente funcional.
import { initializeApp } from "./vendor/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, setPersistence, inMemoryPersistence } from "./vendor/firebase-auth.js";

const el = (id) => document.getElementById(id);
const done = (ok, title, msg) => {
  el('spin').style.display = 'none';
  el('go').style.display = 'none';
  el('title').textContent = title;
  el('msg').textContent = msg;
  if (ok) { const s = document.createElement('div'); s.className = 'ok'; s.textContent = '✓'; el('card').prepend(s); }
  else { el('title').classList.add('err'); el('go').style.display = ''; el('go').textContent = 'Tentar de novo'; }
};

const q = new URLSearchParams(location.search);
const port = q.get('port');
const state = q.get('state');

if (!port || !/^\d{2,5}$/.test(port)) {
  el('go').style.display = 'none';
  done(false, 'Abra pelo app', 'Esta página só funciona aberta pelo Timer de Sessões do Windows.');
  el('go').style.display = 'none';
} else {
  const app = initializeApp(window.firebaseConfig);
  const auth = getAuth(app);
  await setPersistence(auth, inMemoryPersistence).catch(() => {}); // sessão descartável: o login "de verdade" fica no app

  el('go').addEventListener('click', async () => {
    el('spin').style.display = '';
    el('go').disabled = true;
    try {
      const result = await signInWithPopup(auth, new GoogleAuthProvider());
      const cred = GoogleAuthProvider.credentialFromResult(result);
      if (!cred || !cred.idToken) throw new Error('Google não devolveu a credencial.');
      // text/plain = requisição simples (sem preflight); loopback é isento de mixed content
      const r = await fetch('http://127.0.0.1:' + port + '/token', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ state, idToken: cred.idToken }),
      });
      if (!r.ok) throw new Error('O app não recebeu o login (código ' + r.status + '). Ele ainda está aberto?');
      done(true, 'Login concluído!', 'Pode fechar esta aba e voltar pro Timer de Sessões.');
    } catch (e) {
      done(false, 'Não deu certo', ((e && e.code) ? e.code + ' — ' : '') + ((e && e.message) || String(e)));
    } finally {
      el('go').disabled = false;
    }
  });
}
</script>
</body>
</html>
